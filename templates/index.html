<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Review Detector | AI-Powered Analysis</title>
  <meta name="description" content="Detect fake product reviews using AI-powered machine learning analysis with TF-IDF and Logistic Regression." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Floating background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="logo-text">ReviewGuard AI</span>
      </div>
      <p class="subtitle">Powered by Machine Learning &amp; Genetic Algorithm Optimization</p>
    </header>

    <!-- Main Card -->
    <main class="card">
      <div class="card-header">
        <h1>Analyze Product Review</h1>
        <p>Paste a product review below to check its authenticity using our AI model.</p>
      </div>

      <div class="input-group">
        <label for="reviewInput">Review Text</label>
        <textarea
          id="reviewInput"
          rows="6"
          placeholder="e.g. This product is absolutely amazing! Best purchase I have ever made. 5 stars, would buy again. Everyone should get this immediately!"
        ></textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>
      </div>

      <button id="analyzeBtn" onclick="analyzeReview()">
        <span class="btn-text">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Analyze Review
        </span>
        <span class="btn-loader">
          <span class="spinner"></span>
          Analyzing...
        </span>
      </button>

      <!-- Result Box -->
      <div id="resultBox" class="result-box hidden">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-content">
          <div class="result-label" id="resultLabel"></div>
          <div class="result-confidence" id="resultConfidence"></div>
        </div>
      </div>

      <!-- Error Box -->
      <div id="errorBox" class="error-box hidden"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Fake Product Review Detection using Optimization Techniques</p>
    </footer>
  </div>

  <script>
    const textarea = document.getElementById("reviewInput");
    const charCount = document.getElementById("charCount");

    textarea.addEventListener("input", () => {
      charCount.textContent = textarea.value.length;
    });

    async function analyzeReview() {
      const review = textarea.value.trim();
      const btn = document.getElementById("analyzeBtn");
      const resultBox = document.getElementById("resultBox");
      const errorBox = document.getElementById("errorBox");

      resultBox.classList.add("hidden");
      resultBox.classList.remove("show");
      errorBox.classList.add("hidden");

      if (!review) {
        errorBox.textContent = "Please enter a review to analyze.";
        errorBox.classList.remove("hidden");
        return;
      }

      btn.classList.add("loading");
      btn.disabled = true;

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ review: review }),
        });

        const data = await response.json();

        if (data.error) {
          errorBox.textContent = data.error;
          errorBox.classList.remove("hidden");
        } else if (data.result === "Neutral") {
          resultBox.className = "result-box neutral";

          document.getElementById("resultIcon").innerHTML =
            `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

          document.getElementById("resultLabel").textContent = "ℹ Insufficient Input";
          document.getElementById("resultConfidence").textContent = data.message;

          requestAnimationFrame(() => {
            resultBox.classList.add("show");
          });
        } else {
          const isFake = data.result === "Fake";
          resultBox.className = `result-box ${isFake ? "fake" : "real"}`;

          document.getElementById("resultIcon").innerHTML = isFake
            ? `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
            : `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;

          document.getElementById("resultLabel").textContent = isFake
            ? "⚠ Fake Review Detected"
            : "✓ Genuine Review";

          document.getElementById("resultConfidence").textContent =
            `Confidence: ${data.confidence}%`;

          requestAnimationFrame(() => {
            resultBox.classList.add("show");
          });
        }
      } catch (err) {
        errorBox.textContent = "Something went wrong. Please try again.";
        errorBox.classList.remove("hidden");
      } finally {
        btn.classList.remove("loading");
        btn.disabled = false;
      }
    }

    textarea.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key === "Enter") analyzeReview();
    });
  </script>
</body>
</html>
